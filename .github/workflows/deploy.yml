name: CI/CD Deploy Static Website

"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate application files exist
        run: |
          test -f app/index.html
          test -f app/style.css
          test -f app/script.js

      - name: Basic HTML validation
        run: |
          grep -q "<title>" app/index.html
          grep -q "Generate Message" app/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Get Terraform outputs
        id: terraform-output
        working-directory: infra
        run: |
          echo "bucket_name=$(terraform output -raw bucket_name)" >> $GITHUB_OUTPUT
          echo "website_url=$(terraform output -raw website_url)" >> $GITHUB_OUTPUT

      - name: Deploy application to S3
        run: |
          aws s3 sync app/ s3://${{ steps.terraform-output.outputs.bucket_name }} --delete

      - name: Show deployed website URL
        run: |
          echo "Website deployed successfully:"
          echo "${{ steps.terraform-output.outputs.website_url }}"
