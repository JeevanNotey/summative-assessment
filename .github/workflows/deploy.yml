name: CI/CD Pipeline

"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate application files exist
        run: |
          test -f app/index.html
          test -f app/style.css
          test -f app/script.js

      - name: Basic HTML checks
        run: |
          grep -q "<title>" app/index.html
          grep -q "Generate Message" app/index.html

  build_infrastructure:
    runs-on: ubuntu-latest
    needs: validate

    outputs:
      bucket_name: ${{ steps.tf-output.outputs.bucket_name }}
      website_url: ${{ steps.tf-output.outputs.website_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Get Terraform outputs
        id: tf-output
        working-directory: infra
        run: |
          echo "bucket_name=$(terraform output -raw bucket_name)" >> $GITHUB_OUTPUT
          echo "website_url=$(terraform output -raw website_url)" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build_infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy app to S3
        run: |
          aws s3 sync app/ s3://${{ needs.build_infrastructure.outputs.bucket_name }} --delete

      - name: Show deployed website URL
        run: |
          echo "Website deployed successfully:"
          echo "${{ needs.build_infrastructure.outputs.website_url }}"
